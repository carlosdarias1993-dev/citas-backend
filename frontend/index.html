<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reservar cita</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
    margin-bottom: 20px;
}

input, button {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    background: #667eea;
    color: white;
    cursor: pointer;
    border: none;
}

button:hover {
    background: #5a67d8;
}

#horas button {
    margin: 5px;
    width: auto;
}

.libre {
    background: #48bb78;
}

.ocupado {
    background: #e53e3e;
}
</style>
</head>

<body>

<div class="container">
    <h2>Reservar cita</h2>

    <input type="date" id="fecha">
    <input type="text" id="nombre" placeholder="Tu nombre">

    <button onclick="verDisponibilidad()">Ver disponibilidad</button>

    <div id="horas"></div>

    <p id="mensaje"></p>
</div>

<script>

const API = "https://citas-backend-d04e.onrender.com";

// 🔍 VER DISPONIBILIDAD
async function verDisponibilidad() {
    const fecha = document.getElementById("fecha").value;

    if (!fecha) {
        alert("Selecciona una fecha");
        return;
    }

    try {
        const res = await fetch(`${API}/disponibilidad?fecha=${fecha}`);
        const data = await res.json();

        const contenedor = document.getElementById("horas");
        contenedor.innerHTML = "";

        data.forEach(h => {
            const btn = document.createElement("button");
            btn.textContent = h.hora;
            btn.className = h.estado;

            if (h.estado === "libre") {
                btn.onclick = () => reservar(fecha, h.hora);
            } else {
                btn.disabled = true;
            }

            contenedor.appendChild(btn);
        });

    } catch (error) {
        console.error(error);
        alert("Error al cargar disponibilidad");
    }
}


// 📅 RESERVAR
async function reservar(fecha, hora) {
    const nombre = document.getElementById("nombre").value;

    if (!nombre) {
        alert("Escribe tu nombre");
        return;
    }

    try {
        const res = await fetch(`${API}/reservar`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ fecha, hora, nombre })
        });

        const data = await res.json();

        document.getElementById("mensaje").textContent = data.mensaje;

        // 🔄 refrescar disponibilidad
        verDisponibilidad();

    } catch (error) {
        console.error(error);
        alert("Error al reservar");
    }
}

</script>

</body>
</html>
