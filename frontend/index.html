<script>
const API = "https://citas-backend-production-6435.up.railway.app";

// 📋 VER MIS CITAS (ACTUALIZADO)
async function verMisCitas() {
  const token = localStorage.getItem("token");

  const res = await fetch(`${API}/mis-citas`, {
    headers: {
      "Authorization": token
    }
  });

  const data = await res.json();

  const contenedor = document.getElementById("misCitas");
  contenedor.innerHTML = "";

  data.forEach(cita => {
    const div = document.createElement("div");
    div.className = "cita";

    div.innerHTML = `
      📅 ${cita.fecha} - ${cita.hora}
      <button onclick="cancelar('${cita._id}')">❌</button>
    `;

    contenedor.appendChild(div);
  });
}

// ❌ CANCELAR
async function cancelar(id) {
  const token = localStorage.getItem("token");

  const res = await fetch(`${API}/cancelar/${id}`, {
    method: "DELETE",
    headers: {
      "Authorization": token
    }
  });

  const data = await res.json();

  alert(data.mensaje || data.error);

  verMisCitas();
}
</script>
