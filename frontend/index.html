<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reservas</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  text-align: center;
}

.container {
  background: white;
  padding: 20px;
  margin: 50px auto;
  width: 300px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

h1 {
  color: #333;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.libre {
  background: #28a745;
  color: white;
}

.ocupado {
  background: #ccc;
}

</style>
</head>

<body>

<div class="container">
  <h1>Reservar cita</h1>

  <input type="date" id="fecha"><br><br>
  <input type="text" id="nombre" placeholder="Tu nombre"><br><br>

  <button onclick="cargar()">Ver disponibilidad</button>

  <div id="horas"></div>
</div>

<script>

const API = "https://citas-backend.onrender.com";

async function cargar() {
  const fecha = document.getElementById("fecha").value;

  const res = await fetch(`${API}/disponibilidad?fecha=${fecha}`);
  const data = await res.json();

  const cont = document.getElementById("horas");
  cont.innerHTML = "";

  data.forEach(h => {
    const btn = document.createElement("button");
    btn.innerText = h.hora;

    btn.className = h.estado === "ocupado" ? "ocupado" : "libre";

    if (h.estado === "libre") {
      btn.onclick = () => reservar(h.hora);
    } else {
      btn.disabled = true;
    }

    cont.appendChild(btn);
  });
}

async function reservar(hora) {
  const fecha = document.getElementById("fecha").value;
  const nombre = document.getElementById("nombre").value;

  await fetch(`${API}/citas`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      cliente: nombre,
      fecha,
      hora
    })
  });

  alert("Cita reservada");
  cargar();
}

</script>

</body>
</html>
