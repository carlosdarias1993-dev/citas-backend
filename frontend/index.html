<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Barbería Elite</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#1e1e2f,#3a3a70);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:400px;
  background:white;
  border-radius:16px;
  padding:25px;
  box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

.logo{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  margin-bottom:10px;
}

.sub{
  text-align:center;
  font-size:12px;
  color:#777;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#000;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.login-box{
  background:#111;
  padding:20px;
  border-radius:12px;
  color:white;
}

.login-box input{
  background:#222;
  color:white;
  border:none;
}

.dashboard{display:none;}

.nav{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
}

.nav button{
  width:48%;
  background:#eee;
  color:#333;
}

.nav button.active{
  background:#000;
  color:white;
}

.hora{
  margin:5px 0;
  padding:10px;
  border-radius:8px;
}

.libre{background:green;color:white;}
.ocupado{background:red;color:white;}

.cita{
  background:#f2f2f2;
  padding:10px;
  border-radius:8px;
  margin-bottom:5px;
  display:flex;
  justify-content:space-between;
}

.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#000;
  color:white;
  padding:10px;
  border-radius:6px;
  opacity:0;
  transition:0.3s;
}

.toast.show{opacity:1;}
</style>
</head>

<body>

<div class="container">

<div class="logo">💈 Barbería Elite</div>
<div class="sub">Reserva tu turno online</div>

<div id="loginBox" class="login-box">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Entrar</button>
</div>

<div id="dashboard" class="dashboard">

  <div class="nav">
    <button id="btnReservar" onclick="mostrarSeccion('reservar')" class="active">Reservar</button>
    <button id="btnCitas" onclick="mostrarSeccion('citas')">Mis citas</button>
  </div>

  <div id="seccionReservar">
    <input type="date" id="fecha">
    <input id="nombre" placeholder="Tu nombre">
    <button onclick="verDisponibilidad()">Ver horarios</button>
    <div id="horas"></div>
  </div>

  <div id="seccionCitas" style="display:none;">
    <div id="misCitas"></div>
  </div>

  <button onclick="logout()">Salir</button>

</div>

</div>

<div id="toast" class="toast"></div>

<script>
const API="https://citas-backend-production-6435.up.railway.app/api";

function toast(msg){
  const t=document.getElementById("toast");
  t.className="toast show";
  t.textContent=msg;
  setTimeout(()=>t.className="toast",3000);
}

async function login(){
  const res=await fetch(`${API}/auth/login`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:email.value,password:password.value})
  });

  const data=await res.json();

  if(data.token){
    localStorage.setItem("token",data.token);
    loginBox.style.display="none";
    dashboard.style.display="block";
    verMisCitas();
  } else toast("Error login");
}

function mostrarSeccion(s){
  seccionReservar.style.display=s==="reservar"?"block":"none";
  seccionCitas.style.display=s==="citas"?"block":"none";
}

async function verDisponibilidad(){
  const res=await fetch(`${API}/disponibilidad?fecha=${fecha.value}`);
  const data=await res.json();

  horas.innerHTML="";

  data.forEach(h=>{
    const b=document.createElement("button");
    b.textContent=h.hora;
    b.className=`hora ${h.estado}`;
    if(h.estado==="libre") b.onclick=()=>reservar(fecha.value,h.hora);
    horas.appendChild(b);
  });
}

async function reservar(f,h){
  const res=await fetch(`${API}/reservar`,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":localStorage.getItem("token")
    },
    body:JSON.stringify({fecha:f,hora:h,nombre:nombre.value})
  });

  const data=await res.json();
  toast(data.mensaje);
  verDisponibilidad();
  verMisCitas();
}

async function verMisCitas(){
  const res=await fetch(`${API}/mis-citas`,{
    headers:{"Authorization":localStorage.getItem("token")}
  });

  const data=await res.json();
  misCitas.innerHTML="";

  data.forEach(c=>{
    const d=document.createElement("div");
    d.className="cita";
    d.innerHTML=`${c.fecha} ${c.hora}
    <button onclick="cancelar('${c._id}')">❌</button>`;
    misCitas.appendChild(d);
  });
}

async function cancelar(id){
  await fetch(`${API}/cancelar/${id}`,{
    method:"DELETE",
    headers:{"Authorization":localStorage.getItem("token")}
  });
  toast("Cancelado");
  verMisCitas();
}

function logout(){
  localStorage.removeItem("token");
  location.reload();
}

window.onload=()=>{
  if(localStorage.getItem("token")){
    loginBox.style.display="none";
    dashboard.style.display="block";
    verMisCitas();
  }
};
</script>

</body>
</html>
