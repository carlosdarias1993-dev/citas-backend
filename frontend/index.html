<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Barbería Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #4facfe, #8e44ad);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  background: white;
  padding: 25px;
  border-radius: 12px;
  width: 340px;
  text-align: center;
}

input, button {
  width: 100%;
  margin: 8px 0;
  padding: 10px;
  border-radius: 6px;
  border: none;
}

button {
  background: black;
  color: white;
  cursor: pointer;
}

.hora {
  padding: 8px;
  margin: 5px 0;
  cursor: pointer;
  border-radius: 6px;
}

.libre {
  background: green;
  color: white;
}

.ocupada {
  background: red;
  color: white;
}

.selected {
  background: orange !important;
}

.cita {
  background: #eee;
  margin: 5px 0;
  padding: 8px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="container" id="loginBox">
  <h2>Login</h2>
  <input type="email" id="email">
  <input type="password" id="password">
  <button onclick="login()">Entrar</button>
</div>

<div class="container" id="app" style="display:none;">

  <h2>Reservar cita</h2>

  <input type="date" id="fecha">
  <input type="text" id="nombre" placeholder="Tu nombre">

  <button onclick="verHoras()">Ver disponibilidad</button>

  <div id="horas"></div>

  <button id="btnReservar" style="display:none;" onclick="reservar()">Reservar</button>

  <hr>

  <h3>Mis citas</h3>
  <div id="misCitas"></div>

  <button onclick="logout()">Cerrar sesión</button>

</div>

<script>

const API = "https://citas-backend-production-6435.up.railway.app";
let horaSeleccionada = "";

// LOGIN
async function login() {
  const res = await fetch(`${API}/api/auth/login`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);

    loginBox.style.display = "none";
    app.style.display = "block";

    cargarMisCitas();
  } else {
    alert(data.error);
  }
}

// VER HORAS
async function verHoras() {

  const fechaVal = fecha.value;
  const nombreVal = nombre.value;

  if (!fechaVal || !nombreVal) {
    alert("Debes llenar fecha y nombre");
    return;
  }

  const token = localStorage.getItem("token");

  const res = await fetch(`${API}/api/reservas?fecha=${fechaVal}`, {
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const reservas = await res.json();

  const horas = ["09:00","10:00","11:00","12:00","13:00"];

  horasDiv.innerHTML = "";

  horas.forEach(h => {
    const ocupado = reservas.some(r => r.hora === h);

    const div = document.createElement("div");
    div.innerText = h;

    if (ocupado) {
      div.className = "hora ocupada";
    } else {
      div.className = "hora libre";

      div.onclick = () => {
        document.querySelectorAll(".hora").forEach(el => el.classList.remove("selected"));
        div.classList.add("selected");
        horaSeleccionada = h;
        btnReservar.style.display = "block";
      };
    }

    horasDiv.appendChild(div);
  });
}

// RESERVAR
async function reservar() {

  const token = localStorage.getItem("token");

  const res = await fetch(`${API}/api/reservas`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      nombre: nombre.value,
      fecha: fecha.value,
      hora: horaSeleccionada
    })
  });

  const data = await res.json();

  if (res.ok) {
    alert("Reserva creada");

    btnReservar.style.display = "none";
    horaSeleccionada = "";

    cargarMisCitas();
    verHoras();

  } else {
    alert(data.error);
  }
}

// MIS CITAS
async function cargarMisCitas() {

  const token = localStorage.getItem("token");

  const res = await fetch(`${API}/api/reservas/mis-citas`, {
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const citas = await res.json();

  misCitas.innerHTML = "";

  citas.forEach(c => {
    const div = document.createElement("div");
    div.className = "cita";

    div.innerHTML = `
      ${c.fecha} - ${c.hora}
      <button onclick="cancelar('${c._id}')">Cancelar</button>
    `;

    misCitas.appendChild(div);
  });
}

// CANCELAR
async function cancelar(id) {

  const token = localStorage.getItem("token");

  const res = await fetch(`${API}/api/reservas/${id}`, {
    method: "DELETE",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  if (res.ok) {
    alert("Cancelada");
    cargarMisCitas();
    verHoras();
  }
}

// LOGOUT
function logout() {
  localStorage.clear();
  location.reload();
}

// AUTO LOGIN
if (localStorage.getItem("token")) {
  loginBox.style.display = "none";
  app.style.display = "block";
  cargarMisCitas();
}

</script>

</body>
</html>
