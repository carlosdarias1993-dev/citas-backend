<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reservar cita</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    .hora {
      margin: 5px;
      padding: 10px;
      border: none;
      cursor: pointer;
    }

    .libre {
      background: green;
      color: white;
    }

    .ocupado {
      background: red;
      color: white;
    }

    .login-box {
      background: #222;
      color: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox" class="login-box">
    <h3>Login</h3>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- USUARIO -->
  <div id="userBox" style="display:none; margin-bottom:10px;">
    <p>✅ Sesión iniciada</p>
    <button onclick="logout()">Cerrar sesión</button>
  </div>

  <h2>Reservar cita</h2>

  <input type="date" id="fecha">
  <input type="text" id="nombre" placeholder="Tu nombre">

  <button onclick="verDisponibilidad()">Ver disponibilidad</button>

  <div id="horas"></div>
</div>

<script>
const API = "https://citas-backend-production-6435.up.railway.app";

// 🔐 LOGIN
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(`${API}/api/auth/login`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("userBox").style.display = "block";

    alert("Login correcto 🔥");
  } else {
    alert(data.error || "Error en login");
  }
}

// 🔓 LOGOUT
function logout() {
  localStorage.removeItem("token");

  document.getElementById("loginBox").style.display = "block";
  document.getElementById("userBox").style.display = "none";
}

// 🔄 AUTO LOGIN
window.onload = () => {
  const token = localStorage.getItem("token");

  if (token) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("userBox").style.display = "block";
  }
};

// 📅 DISPONIBILIDAD
async function verDisponibilidad() {
  const token = localStorage.getItem("token");

  if (!token) {
    alert("Debes iniciar sesión primero");
    return;
  }

  const fecha = document.getElementById("fecha").value;

  if (!fecha) {
    alert("Selecciona una fecha");
    return;
  }

  const res = await fetch(`${API}/disponibilidad?fecha=${fecha}`);
  const data = await res.json();

  const contenedor = document.getElementById("horas");
  contenedor.innerHTML = "";

  data.forEach(h => {
    const btn = document.createElement("button");
    btn.textContent = h.hora;
    btn.className = `hora ${h.estado}`;

    if (h.estado === "libre") {
      btn.onclick = () => reservar(fecha, h.hora);
    } else {
      btn.disabled = true;
    }

    contenedor.appendChild(btn);
  });
}

// 🔐 RESERVAR
async function reservar(fecha, hora) {
  const nombre = document.getElementById("nombre").value;
  const token = localStorage.getItem("token");

  if (!token) {
    alert("Debes iniciar sesión primero");
    return;
  }

  if (!nombre) {
    alert("Introduce tu nombre");
    return;
  }

  const res = await fetch(`${API}/reservar`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({ fecha, hora, nombre })
  });

  const data = await res.json();

  alert(data.mensaje || data.error);

  verDisponibilidad();
}
</script>

</body>
</html>
