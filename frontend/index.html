<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reservar cita</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  background: white;
  padding: 30px;
  border-radius: 10px;
  width: 300px;
  text-align: center;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  cursor: pointer;
}

.hora {
  margin: 5px;
}

.libre {
  background: green;
  color: white;
}

.ocupado {
  background: red;
  color: white;
}
</style>
</head>

<body>

<div class="container">
  <h2>Reservar cita</h2>

  <input type="date" id="fecha"><br><br>
  <input type="text" id="nombre" placeholder="Tu nombre"><br><br>

  <button onclick="verDisponibilidad()">Ver disponibilidad</button>

  <div id="horas"></div>
</div>

<script>
const API = "https://citas-backend-d04e.onrender.com"; // ⚠️ TU URL

async function verDisponibilidad() {
  const fecha = document.getElementById("fecha").value;

  if (!fecha) {
    alert("Selecciona una fecha");
    return;
  }

  try {
    const res = await fetch(`${API}/disponibilidad?fecha=${fecha}`);
    const data = await res.json();

    const contenedor = document.getElementById("horas");
    contenedor.innerHTML = "";

    data.forEach(h => {
      const btn = document.createElement("button");
      btn.textContent = h.hora;
      btn.className = "hora " + h.estado;

      if (h.estado === "libre") {
        btn.onclick = () => reservar(fecha, h.hora);
      } else {
        btn.disabled = true;
      }

      contenedor.appendChild(btn);
    });

  } catch (error) {
    alert("Error al cargar disponibilidad");
    console.error(error);
  }
}

async function reservar(fecha, hora) {
  const nombre = document.getElementById("nombre").value;

  if (!nombre) {
    alert("Pon tu nombre");
    return;
  }

  const res = await fetch(`${API}/reservar`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ fecha, hora, nombre })
  });

  const data = await res.json();
  alert(data.mensaje);

  verDisponibilidad();
}
</script>

</body>
</html>
