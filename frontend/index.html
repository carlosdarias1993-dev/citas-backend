<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reservas Online</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 400px;
      margin: 50px auto;
      background: white;
      color: black;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    input {
      background: #f0f0f0;
    }

    button {
      background: #667eea;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #5a67d8;
    }

    .horas {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .hora {
      padding: 10px;
      text-align: center;
      border-radius: 8px;
      font-weight: bold;
    }

    .libre {
      background: #48bb78;
      color: white;
      cursor: pointer;
    }

    .libre:hover {
      background: #38a169;
    }

    .ocupado {
      background: #e2e8f0;
      color: #777;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>📅 Reservar Cita</h1>

  <input type="text" id="cliente" placeholder="Tu nombre">
  <input type="date" id="fecha">

  <button onclick="cargarDisponibilidad()">Ver horarios</button>

  <div class="horas" id="horas"></div>

  <div class="footer">
    Sistema de reservas automático
  </div>
</div>

<script>

const API = "http://localhost:3000";

// Cargar disponibilidad
async function cargarDisponibilidad() {
  const fecha = document.getElementById("fecha").value;

  if (!fecha) {
    alert("Selecciona una fecha");
    return;
  }

  const res = await fetch(`${API}/disponibilidad?fecha=${fecha}`);
  const data = await res.json();

  const contenedor = document.getElementById("horas");
  contenedor.innerHTML = "";

  data.forEach(h => {
    const div = document.createElement("div");
    div.innerText = h.hora;
    div.className = "hora " + (h.estado === "libre" ? "libre" : "ocupado");

    if (h.estado === "libre") {
      div.onclick = () => reservar(h.hora);
    }

    contenedor.appendChild(div);
  });
}

// Reservar
async function reservar(hora) {
  const cliente = document.getElementById("cliente").value;
  const fecha = document.getElementById("fecha").value;

  if (!cliente) {
    alert("Pon tu nombre");
    return;
  }

  const res = await fetch(`${API}/citas`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ cliente, fecha, hora })
  });

  const data = await res.json();

  alert(data.mensaje);

  cargarDisponibilidad();
}

</script>

</body>
</html>
