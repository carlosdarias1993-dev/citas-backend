<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reservar cita</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #3a3a70);
  height: 100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container {
  background:#fff;
  padding:30px;
  border-radius:16px;
  width:360px;
  box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

h2,h3 { margin-bottom:15px; }

input {
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid #ddd;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#667eea;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover { transform:scale(1.02); }

.login-box {
  background:#1f1f2e;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  color:white;
}

.login-box input {
  background:#2a2a40;
  color:white;
  border:none;
}

.switch {
  font-size:12px;
  margin-top:5px;
  cursor:pointer;
  color:#aaa;
}

.hora { margin:5px 0; border-radius:8px; }
.libre { background:#28a745; }
.ocupado { background:#dc3545; cursor:not-allowed; }

.cita {
  background:#f1f1f1;
  padding:10px;
  border-radius:8px;
  margin-top:6px;
  display:flex;
  justify-content:space-between;
}

.cita button {
  background:#dc3545;
  padding:5px 8px;
}

.user-box {
  text-align:center;
  margin-bottom:15px;
}

/* 🔥 NOTIFICACIONES */
.toast {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#333;
  color:white;
  padding:12px 18px;
  border-radius:8px;
  opacity:0;
  transform:translateY(20px);
  transition:0.3s;
}

.toast.show {
  opacity:1;
  transform:translateY(0);
}

.success { background:#28a745; }
.error { background:#dc3545; }

</style>
</head>

<body>

<div class="container">

<div id="loginBox" class="login-box">
  <h3>Login</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Entrar</button>
  <p class="switch" onclick="mostrarRegistro()">Crear cuenta</p>
</div>

<div id="registerBox" class="login-box" style="display:none;">
  <h3>Registro</h3>
  <input id="nombreReg" placeholder="Nombre">
  <input id="emailReg" placeholder="Email">
  <input id="passwordReg" placeholder="Password">
  <button onclick="register()">Registrarse</button>
  <p class="switch" onclick="mostrarLogin()">Ya tengo cuenta</p>
</div>

<div id="userBox" class="user-box" style="display:none;">
  <p>✅ Sesión activa</p>
  <button onclick="verMisCitas()">Mis citas</button>
  <button onclick="logout()">Cerrar sesión</button>
</div>

<div id="appBox" style="display:none;">
  <h2>Reservar cita</h2>

  <input type="date" id="fecha">
  <input type="text" id="nombre" placeholder="Tu nombre">

  <button onclick="verDisponibilidad()">Ver disponibilidad</button>

  <div id="horas"></div>

  <h3>Mis citas</h3>
  <div id="misCitas"></div>
</div>

</div>

<!-- 🔥 TOAST -->
<div id="toast" class="toast"></div>

<script>
const API = "https://citas-backend-production-6435.up.railway.app/api";

// 🔥 NOTIFICACIONES
function mostrarToast(mensaje, tipo="success") {
  const toast = document.getElementById("toast");
  toast.className = `toast show ${tipo}`;
  toast.textContent = mensaje;

  setTimeout(() => {
    toast.className = "toast";
  }, 3000);
}

// LOGIN
async function login() {
  const res = await fetch(`${API}/auth/login`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if(data.token){
    localStorage.setItem("token", data.token);
    loginBox.style.display="none";
    userBox.style.display="block";
    appBox.style.display="block";
    verMisCitas();
    mostrarToast("Bienvenido 🔥");
  } else {
    mostrarToast(data.error,"error");
  }
}

// REGISTRO
async function register(){
  const res = await fetch(`${API}/auth/register`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      nombre:nombreReg.value,
      email:emailReg.value,
      password:passwordReg.value
    })
  });

  mostrarToast("Cuenta creada");
  mostrarLogin();
}

// DISPONIBILIDAD
async function verDisponibilidad(){
  const res = await fetch(`${API}/disponibilidad?fecha=${fecha.value}`);
  const data = await res.json();

  horas.innerHTML="";

  data.forEach(h=>{
    const btn=document.createElement("button");
    btn.textContent=h.hora;
    btn.className=`hora ${h.estado}`;

    if(h.estado==="libre"){
      btn.onclick=()=>reservar(fecha.value,h.hora);
    } else {
      btn.disabled=true;
    }

    horas.appendChild(btn);
  });
}

// RESERVAR
async function reservar(fechaVal,hora){
  const res = await fetch(`${API}/reservar`,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":localStorage.getItem("token")
    },
    body:JSON.stringify({
      fecha:fechaVal,
      hora,
      nombre:document.getElementById("nombre").value
    })
  });

  const data=await res.json();
  mostrarToast(data.mensaje || data.error, data.error?"error":"success");

  verDisponibilidad();
  verMisCitas();
}

// MIS CITAS
async function verMisCitas(){
  const res = await fetch(`${API}/mis-citas`,{
    headers:{"Authorization":localStorage.getItem("token")}
  });

  const data=await res.json();
  misCitas.innerHTML="";

  data.forEach(cita=>{
    const div=document.createElement("div");
    div.className="cita";

    div.innerHTML=`
      ${cita.fecha} - ${cita.hora}
      <button onclick="cancelar('${cita._id}')">❌</button>
    `;

    misCitas.appendChild(div);
  });
}

// CANCELAR
async function cancelar(id){
  const res = await fetch(`${API}/cancelar/${id}`,{
    method:"DELETE",
    headers:{"Authorization":localStorage.getItem("token")}
  });

  const data=await res.json();
  mostrarToast(data.mensaje);

  verMisCitas();
}

// UI
function mostrarRegistro(){ loginBox.style.display="none"; registerBox.style.display="block"; }
function mostrarLogin(){ loginBox.style.display="block"; registerBox.style.display="none"; }

function logout(){
  localStorage.removeItem("token");
  location.reload();
}

window.onload=()=>{
  if(localStorage.getItem("token")){
    loginBox.style.display="none";
    userBox.style.display="block";
    appBox.style.display="block";
    verMisCitas();
  }
};
</script>

</body>
</html>
