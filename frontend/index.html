<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reservar cita</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    .hora {
      margin: 5px;
      padding: 10px;
      border: none;
      cursor: pointer;
    }

    .libre {
      background: green;
      color: white;
    }

    .ocupado {
      background: red;
      color: white;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Reservar cita</h2>

  <input type="date" id="fecha">
  <input type="text" id="nombre" placeholder="Tu nombre">

  <button onclick="verDisponibilidad()">Ver disponibilidad</button>

  <div id="horas"></div>
</div>

<script>
const API = "https://citas-backend-production-6435.up.railway.app";

async function verDisponibilidad() {
  const fecha = document.getElementById("fecha").value;

  if (!fecha) {
    alert("Selecciona una fecha");
    return;
  }

  try {
    const res = await fetch(`${API}/disponibilidad?fecha=${fecha}`);
    const data = await res.json();

    console.log("DATA:", data); // 👈 IMPORTANTE PARA DEBUG

    const contenedor = document.getElementById("horas");
    contenedor.innerHTML = "";

    data.forEach(h => {
      const btn = document.createElement("button");
      btn.textContent = h.hora;
      btn.className = `hora ${h.estado}`;

      if (h.estado === "libre") {
        btn.onclick = () => reservar(fecha, h.hora);
      } else {
        btn.disabled = true;
      }

      contenedor.appendChild(btn);
    });

  } catch (error) {
    console.error(error);
    alert("Error al cargar disponibilidad");
  }
}

async function reservar(fecha, hora) {
  const nombre = document.getElementById("nombre").value;

  if (!nombre) {
    alert("Introduce tu nombre");
    return;
  }

  try {
    const res = await fetch(`${API}/reservar`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ fecha, hora, nombre })
    });

    const data = await res.json();

    alert(data.mensaje || data.error);

    verDisponibilidad();

  } catch (error) {
    console.error(error);
    alert("Error al reservar");
  }
}
</script>

</body>
</html>
