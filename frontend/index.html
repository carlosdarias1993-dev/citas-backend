<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Barbería Elite</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#1e1e2f,#3a3a70);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:400px;
  background:white;
  border-radius:16px;
  padding:25px;
  box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

.logo{text-align:center;font-weight:bold;margin-bottom:10px;}
.sub{text-align:center;font-size:12px;color:#777;margin-bottom:15px;}

input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#000;
  color:white;
  cursor:pointer;
}

.hora{
  margin:5px 0;
  padding:10px;
  border-radius:8px;
}

.libre{background:green;color:white;}
.ocupado{background:red;color:white;}

.selected{border:3px solid yellow;}

.cita{
  background:#f2f2f2;
  padding:10px;
  border-radius:8px;
  margin-bottom:5px;
  display:flex;
  justify-content:space-between;
}

.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:black;
  color:white;
  padding:10px;
  border-radius:6px;
  opacity:0;
  transition:0.3s;
}

.toast.show{opacity:1;}
</style>
</head>

<body>

<div class="container">

<div class="logo">💈 Barbería Elite</div>
<div class="sub">Reserva tu turno online</div>

<!-- LOGIN -->
<div id="loginBox">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <h3>Reservar</h3>

  <input type="date" id="fecha">
  <input id="nombre" placeholder="Tu nombre">

  <button onclick="verDisponibilidad()">Ver horarios</button>

  <div id="horas"></div>

  <button onclick="confirmarReserva()">RESERVAR</button>

  <h3>Mis citas</h3>
  <div id="misCitas"></div>

  <h3>Agenda del día (barbero)</h3>
  <div id="agenda"></div>

  <button onclick="logout()">Salir</button>

</div>

</div>

<div id="toast" class="toast"></div>

<script>
const API="https://citas-backend-production-6435.up.railway.app/api";

let horaSeleccionada=null;

// 🔔 MENSAJES
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.className="toast show";
  setTimeout(()=>t.className="toast",3000);
}

// LOGIN
async function login(){
  const res=await fetch(`${API}/auth/login`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  });

  const data=await res.json();

  if(data.token){
    localStorage.setItem("token",data.token);
    loginBox.style.display="none";
    app.style.display="block";
    verMisCitas();
  }
}

// VER HORAS
async function verDisponibilidad(){
  const res=await fetch(`${API}/disponibilidad?fecha=${fecha.value}`);
  const data=await res.json();

  horas.innerHTML="";
  horaSeleccionada=null;

  data.forEach(h=>{
    const btn=document.createElement("button");
    btn.textContent=h.hora;
    btn.className=`hora ${h.estado}`;

    if(h.estado==="libre"){
      btn.onclick=()=>{
        horaSeleccionada=h.hora;
        document.querySelectorAll(".hora").forEach(b=>b.classList.remove("selected"));
        btn.classList.add("selected");
      }
    } else btn.disabled=true;

    horas.appendChild(btn);
  });
}

// CONFIRMAR RESERVA
async function confirmarReserva(){
  if(!horaSeleccionada){
    toast("Selecciona una hora");
    return;
  }

  const res=await fetch(`${API}/reservar`,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":localStorage.getItem("token")
    },
    body:JSON.stringify({
      fecha:fecha.value,
      hora:horaSeleccionada,
      nombre:nombre.value
    })
  });

  const data=await res.json();

  toast(data.mensaje || data.error);

  verDisponibilidad();
  verMisCitas();
  verAgenda();
}

// MIS CITAS
async function verMisCitas(){
  const res=await fetch(`${API}/mis-citas`,{
    headers:{ "Authorization":localStorage.getItem("token")}
  });

  const data=await res.json();

  misCitas.innerHTML="";

  data.forEach(c=>{
    const div=document.createElement("div");
    div.className="cita";
    div.innerHTML=`${c.fecha} - ${c.hora}`;
    misCitas.appendChild(div);
  });
}

// AGENDA DEL BARBERO
async function verAgenda(){
  const res=await fetch(`${API}/disponibilidad?fecha=${fecha.value}`);
  const data=await res.json();

  agenda.innerHTML="";

  data.forEach(h=>{
    const div=document.createElement("div");
    div.textContent=`${h.hora} - ${h.estado}`;
    agenda.appendChild(div);
  });
}

// LOGOUT
function logout(){
  localStorage.removeItem("token");
  location.reload();
}
</script>

</body>
</html>
