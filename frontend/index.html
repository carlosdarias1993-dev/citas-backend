<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>App de Citas</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #3a3a70);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* CONTENEDOR */
.container {
  width:400px;
  background:white;
  border-radius:16px;
  padding:25px;
  box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

/* TITULOS */
h2 { margin-bottom:15px; }

/* INPUTS */
input {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

/* BOTONES */
button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#667eea;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover { background:#5a67d8; }

/* LOGIN */
.login-box {
  background:#1f1f2e;
  padding:20px;
  border-radius:12px;
  color:white;
}

.login-box input {
  background:#2a2a40;
  color:white;
  border:none;
}

/* DASHBOARD */
.dashboard {
  display:none;
}

/* NAV */
.nav {
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
}

.nav button {
  width:48%;
  background:#eee;
  color:#333;
}

.nav button.active {
  background:#667eea;
  color:white;
}

/* HORAS */
.hora {
  margin:5px 0;
  padding:10px;
  border-radius:8px;
}

.libre { background:green; color:white; }
.ocupado { background:red; color:white; }

/* CITAS */
.cita {
  background:#f2f2f2;
  padding:10px;
  border-radius:8px;
  margin-bottom:5px;
  display:flex;
  justify-content:space-between;
}

/* TOAST */
.toast {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#333;
  color:white;
  padding:10px;
  border-radius:6px;
  opacity:0;
  transition:0.3s;
}

.toast.show { opacity:1; }
.success { background:green; }
.error { background:red; }

</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="login-box">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Entrar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

  <div class="nav">
    <button id="btnReservar" onclick="mostrarSeccion('reservar')" class="active">Reservar</button>
    <button id="btnCitas" onclick="mostrarSeccion('citas')">Mis citas</button>
  </div>

  <!-- RESERVAR -->
  <div id="seccionReservar">
    <h2>Nueva cita</h2>

    <input type="date" id="fecha">
    <input id="nombre" placeholder="Tu nombre">

    <button onclick="verDisponibilidad()">Ver horas</button>

    <div id="horas"></div>
  </div>

  <!-- MIS CITAS -->
  <div id="seccionCitas" style="display:none;">
    <h2>Mis citas</h2>
    <div id="misCitas"></div>
  </div>

  <button onclick="logout()">Cerrar sesión</button>

</div>

</div>

<div id="toast" class="toast"></div>

<script>
const API = "https://citas-backend-production-6435.up.railway.app/api";

// 🔥 TOAST
function toast(msg,type="success"){
  const t=document.getElementById("toast");
  t.className=`toast show ${type}`;
  t.textContent=msg;
  setTimeout(()=>t.className="toast",3000);
}

// LOGIN
async function login(){
  const res = await fetch(`${API}/auth/login`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  });

  const data = await res.json();

  if(data.token){
    localStorage.setItem("token",data.token);
    loginBox.style.display="none";
    dashboard.style.display="block";
    verMisCitas();
    toast("Bienvenido");
  } else {
    toast(data.error,"error");
  }
}

// CAMBIAR SECCIONES
function mostrarSeccion(seccion){
  seccionReservar.style.display = seccion==="reservar"?"block":"none";
  seccionCitas.style.display = seccion==="citas"?"block":"none";

  btnReservar.classList.toggle("active",seccion==="reservar");
  btnCitas.classList.toggle("active",seccion==="citas");
}

// DISPONIBILIDAD
async function verDisponibilidad(){
  const res = await fetch(`${API}/disponibilidad?fecha=${fecha.value}`);
  const data = await res.json();

  horas.innerHTML="";

  data.forEach(h=>{
    const btn=document.createElement("button");
    btn.textContent=h.hora;
    btn.className=`hora ${h.estado}`;

    if(h.estado==="libre"){
      btn.onclick=()=>reservar(fecha.value,h.hora);
    }

    horas.appendChild(btn);
  });
}

// RESERVAR
async function reservar(fechaVal,hora){
  const res = await fetch(`${API}/reservar`,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":localStorage.getItem("token")
    },
    body:JSON.stringify({
      fecha:fechaVal,
      hora,
      nombre:document.getElementById("nombre").value
    })
  });

  const data=await res.json();
  toast(data.mensaje || data.error);

  verDisponibilidad();
  verMisCitas();
}

// MIS CITAS
async function verMisCitas(){
  const res = await fetch(`${API}/mis-citas`,{
    headers:{
      "Authorization":localStorage.getItem("token")
    }
  });

  const data=await res.json();
  misCitas.innerHTML="";

  data.forEach(c=>{
    const div=document.createElement("div");
    div.className="cita";

    div.innerHTML=`
      ${c.fecha} - ${c.hora}
      <button onclick="cancelar('${c._id}')">❌</button>
    `;

    misCitas.appendChild(div);
  });
}

// CANCELAR
async function cancelar(id){
  const res = await fetch(`${API}/cancelar/${id}`,{
    method:"DELETE",
    headers:{
      "Authorization":localStorage.getItem("token")
    }
  });

  const data=await res.json();
  toast(data.mensaje);

  verMisCitas();
}

// LOGOUT
function logout(){
  localStorage.removeItem("token");
  location.reload();
}

// AUTO LOGIN
window.onload=()=>{
  if(localStorage.getItem("token")){
    loginBox.style.display="none";
    dashboard.style.display="block";
    verMisCitas();
  }
};
</script>

</body>
</html>
