<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Barbería Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #4facfe, #8e44ad);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  background: white;
  padding: 25px;
  border-radius: 12px;
  width: 340px;
  text-align: center;
}

input, button {
  width: 100%;
  margin: 8px 0;
  padding: 10px;
  border-radius: 6px;
  border: none;
}

button {
  background: black;
  color: white;
  cursor: pointer;
}

.hora {
  padding: 8px;
  margin: 5px 0;
  cursor: pointer;
  border-radius: 6px;
}

.libre {
  background: green;
  color: white;
}

.ocupada {
  background: red;
  color: white;
  cursor: not-allowed;
}

.selected {
  background: orange !important;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginBox">
  <h2>Login</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div class="container hidden" id="app">

  <h2>Reservar cita</h2>

  <div id="formulario">
    <input type="date" id="fecha">
    <input type="text" id="nombre" placeholder="Tu nombre">

    <button onclick="verHoras()">Ver disponibilidad</button>
  </div>

  <div id="horas"></div>

  <button id="btnReservar" class="hidden" onclick="reservar()">Reservar</button>

  <button onclick="volver()">⬅ Volver</button>

  <hr>

  <h3>Mis citas</h3>
  <div id="misCitas"></div>

  <button onclick="logout()">Cerrar sesión</button>

</div>

<script>

const API = "https://citas-backend-production-6435.up.railway.app";

let horaSeleccionada = "";

// ================= LOGIN =================
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(`${API}/api/auth/login`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);

    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    cargarMisCitas();
  } else {
    alert(data.error || "Error en login");
  }
}

// ================= VER HORAS =================
async function verHoras() {

  const fecha = document.getElementById("fecha").value;
  const nombre = document.getElementById("nombre").value;

  if (!fecha || !nombre) {
    alert("Debes llenar fecha y nombre");
    return;
  }

  const token = localStorage.getItem("token");

  const res = await fetch(`${API}/api/reservas?fecha=${fecha}`, {
    headers: { "Authorization": token }
  });

  const reservas = await res.json();

  const horasBase = ["09:00","10:00","11:00","12:00","13:00"];

  const cont = document.getElementById("horas");
  cont.innerHTML = "";

  horasBase.forEach(h => {
    const div = document.createElement("div");

    const ocupada = reservas.some(r => r.hora === h);

    div.innerText = h;

    if (ocupada) {
      div.className = "hora ocupada";
    } else {
      div.className = "hora libre";

      div.onclick = () => {
        document.querySelectorAll(".hora").forEach(el => el.classList.remove("selected"));
        div.classList.add("selected");
        horaSeleccionada = h;

        document.getElementById("btnReservar").classList.remove("hidden");
      };
    }

    cont.appendChild(div);
  });
}

// ================= RESERVAR =================
async function reservar() {

  const fecha = document.getElementById("fecha").value;
  const nombre = document.getElementById("nombre").value;
  const token = localStorage.getItem("token");

  const res = await fetch(`${API}/api/reservas`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      nombre,
      fecha,
      hora: horaSeleccionada
    })
  });

  const data = await res.json();

  if (res.ok) {
    alert("Reserva creada 🔥");

    horaSeleccionada = "";
    document.getElementById("btnReservar").classList.add("hidden");

    verHoras();
    cargarMisCitas();

  } else {
    alert(data.error || "Error");
  }
}

// ================= MIS CITAS =================
async function cargarMisCitas() {

  const token = localStorage.getItem("token");

  const res = await fetch(`${API}/api/reservas/mis-citas`, {
    headers: { "Authorization": token }
  });

  const citas = await res.json();

  const cont = document.getElementById("misCitas");
  cont.innerHTML = "";

  citas.forEach(c => {
    const div = document.createElement("div");
    div.innerText = `${c.fecha} - ${c.hora}`;
    cont.appendChild(div);
  });
}

// ================= VOLVER =================
function volver() {
  document.getElementById("horas").innerHTML = "";
  document.getElementById("btnReservar").classList.add("hidden");
}

// ================= LOGOUT =================
function logout() {
  localStorage.clear();
  location.reload();
}

// ================= AUTO LOGIN =================
if (localStorage.getItem("token")) {
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  cargarMisCitas();
}

</script>

</body>
</html>
