<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Barbería Elite</title>

<style>
body{
  font-family:'Segoe UI';
  background:#1e1e2f;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:white;
  color:black;
  padding:20px;
  border-radius:12px;
  width:350px;
}

button{
  width:100%;
  padding:10px;
  margin:5px 0;
}

.cita{
  background:#eee;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginBox">
  <h3>Login</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Entrar</button>
</div>

<!-- CLIENTE -->
<div id="clientePanel" style="display:none;">
  <h3>Reservar</h3>

  <input type="date" id="fecha">
  <input id="nombre" placeholder="Nombre">

  <button onclick="verDisponibilidad()">Ver horas</button>
  <div id="horas"></div>

  <button onclick="reservar()">Reservar</button>

  <h4>Mis citas</h4>
  <div id="misCitas"></div>
</div>

<!-- BARBERO -->
<div id="barberoPanel" style="display:none;">
  <h3>Agenda del día</h3>

  <input type="date" id="fechaBarbero">
  <button onclick="verAgenda()">Ver agenda</button>

  <div id="agenda"></div>
</div>

</div>

<script>
const API="https://citas-backend-production-6435.up.railway.app/api";

let token="";
let horaSeleccionada="";

// LOGIN
async function login(){
  const res=await fetch(`${API}/auth/login`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  });

  const data=await res.json();

  if(data.token){
    token=data.token;
    localStorage.setItem("token",token);

    loginBox.style.display="none";

    // 🔥 DETECTAR BARBERO
    if(email.value==="barbero@admin.com"){
      barberoPanel.style.display="block";
    } else {
      clientePanel.style.display="block";
      verMisCitas();
    }
  }
}

// CLIENTE

async function verDisponibilidad(){
  const res=await fetch(`${API}/disponibilidad?fecha=${fecha.value}`);
  const data=await res.json();

  horas.innerHTML="";

  data.forEach(h=>{
    const b=document.createElement("button");
    b.textContent=h.hora;

    if(h.estado==="libre"){
      b.onclick=()=>horaSeleccionada=h.hora;
    } else b.disabled=true;

    horas.appendChild(b);
  });
}

async function reservar(){
  const res=await fetch(`${API}/reservar`,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":localStorage.getItem("token")
    },
    body:JSON.stringify({
      fecha:fecha.value,
      hora:horaSeleccionada,
      nombre:nombre.value
    })
  });

  alert("Reservado");

  verMisCitas();
}

async function verMisCitas(){
  const res=await fetch(`${API}/mis-citas`,{
    headers:{ "Authorization":localStorage.getItem("token")}
  });

  const data=await res.json();

  misCitas.innerHTML="";

  data.forEach(c=>{
    const d=document.createElement("div");
    d.className="cita";
    d.textContent=`${c.fecha} ${c.hora}`;
    misCitas.appendChild(d);
  });
}

// BARBERO

async function verAgenda(){
  const res=await fetch(`${API}/disponibilidad?fecha=${fechaBarbero.value}`);
  const data=await res.json();

  agenda.innerHTML="";

  data.forEach(h=>{
    const d=document.createElement("div");
    d.className="cita";
    d.textContent=`${h.hora} - ${h.estado}`;
    agenda.appendChild(d);
  });
}
</script>

</body>
</html>
